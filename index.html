<html>
	<head>
		<title>Dimension</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="description" content="A fully responsive site template designed by HTML5 UP">
		<meta property="og:site_name" content="Dimension">
		<meta property="og:title" content="Dimension">
		<meta property="og:type" content="website">
		<meta property="og:description" content="A fully responsive site template designed by HTML5 UP">
		<meta property="og:image" content="images/free-diamond-favicon.png">
		<meta property="og:image:type" content="image/jpeg">
		<meta property="og:image:width" content="1280">
		<meta property="og:image:height" content="800">
		<link rel="icon" type="image/png" href="images/free-diamond-favicon.png">
		<link rel="stylesheet" href="assets/css/main.css" />
		<!--[if lte IE 9]><link rel="stylesheet" href="assets/css/ie9.css" /><![endif]-->
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body>

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<div class="logo">
<!-- 							<span class="icon fa-diamond"></span> -->
							<img src="images/temp-logo-1.png" alt="Temp Logo"/>
						</div>
						<div class="content">
							<div class="inner">
								<h1>Arium Immigration</h1>
								<p>
									Helping people navigate Canada’s immigration system with clarity and care.<br>Guided by lived experience, grounded in legal understanding.<br>Welcome to Arium Immigration.
								</p>
							</div>
						</div>
						<nav>
							<ul>
								<li><a href="#intro">Intro</a></li>
								<li><a href="#work">Work</a></li>
								<li><a href="#about">About</a></li>
								<li><a href="#contact">Contact</a></li>
								<!-- <li><a href="#elements">Elements</a></li> -->
							</ul>
						</nav>
					</header>

				<!-- Main -->
					<div id="main">
						<!-- Section content will be loaded dynamically -->
					</div>

				<!-- Footer -->
					<footer id="footer">
						<p class="copyright">&copy; Untitled. Design: <a href="https://html5up.net">HTML5 UP</a>.</p>
					</footer>

			</div>

		<!-- BG -->
			<div id="bg"></div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/skel.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script>
				// Load section content dynamically
				$(function() {
					// Define the sections to load
					var sections = ['intro', 'work', 'about', 'contact', 'elements'];
					var loadedSections = 0;
					var totalSections = sections.length;
					
					// Load each section
					sections.forEach(function(section) {
						$.ajax({
							url: 'sections/' + section + '/index.html',
							dataType: 'html',
							success: function(data) {
								$('#main').append(data);
								loadedSections++;
								
								// When all sections are loaded, trigger the sectionsLoaded event
								if (loadedSections === totalSections) {
									$(window).trigger('sectionsLoaded');
									
									// Check for hash in URL and show the appropriate section
									if (location.hash && location.hash !== '#') {
										var sectionId = location.hash.substring(1);
										setTimeout(function() {
											$('a[href="#' + sectionId + '"]').trigger('click');
										}, 500);
									}
								}
							},
							error: function() {
								console.error('Failed to load section: ' + section);
								loadedSections++;
								
								// Even if there's an error, check if all sections have been processed
								if (loadedSections === totalSections) {
									$(window).trigger('sectionsLoaded');
								}
							}
						});
					});
				});
			</script>

	</body>
</html>
