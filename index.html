	<body>

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<!--<div class="logo">
 							<span class="icon fa-diamond"></span> 
							<img src="images/temp-logo-1.png" alt="Temp Logo"/>
						</div>-->
						<div class="logo" style="width: 10em; height: 10em; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background-color: #eee;">
						  <img src="images/temp-logo-2.png" alt="Temp Logo" style="width: 100%; height: 100%; object-fit: cover;" />
						</div>

						<div class="content">
							<div class="inner">
								<style>
									p {margin: 0.5em;}
								</style>
								<h1>Arium Immigration</h1>
								<!-- <p>&nbsp;</p> -->
								<p>
									Helping people navigate Canada’s immigration system with clarity and care.
								</p>

						<nav>

								<li><a href="#about">About</a></li>

				<!-- Main -->

				<!-- Footer -->
					<footer id="footer">

		<!-- BG -->
			<div id="bg"></div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/skel.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script>
				// Load section content dynamically
				$(function() {
					// Define the sections to load
					var sections = ['intro', 'services', 'about', 'contact', 'elements'];
					var loadedSections = 0;
					var totalSections = sections.length;
					
					// Load each section
					sections.forEach(function(section) {
						$.ajax({
							url: 'sections/' + section + '/index.html',
							dataType: 'html',
							success: function(data) {
								$('#main').append(data);
								loadedSections++;
								
								// When all sections are loaded, trigger the sectionsLoaded event
								if (loadedSections === totalSections) {
									$(window).trigger('sectionsLoaded');
									
									// Check for hash in URL and show the appropriate section
									if (location.hash && location.hash !== '#') {
										var sectionId = location.hash.substring(1);
										setTimeout(function() {
											$('a[href="#' + sectionId + '"]').trigger('click');
										}, 500);
									}
								}
							},
							error: function() {
								console.error('Failed to load section: ' + section);
								loadedSections++;
								
								// Even if there's an error, check if all sections have been processed
								if (loadedSections === totalSections) {
									$(window).trigger('sectionsLoaded');
								}
							}
						});
					});
				});
			</script>

	</body>
</html>
